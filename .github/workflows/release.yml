name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build Python Distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3 python3-all python3-setuptools python3-build \
            build-essential devscripts debhelper dh-python \
            fakeroot lintian ca-certificates git

      - name: Build .deb
        run: |
          cd packaging
          dpkg-buildpackage -us -uc -b
          mv ../*.deb ../debian-package.deb

      - name: Lint .deb
        run: lintian --tag-display-limit 0 --fail-on error --suppress-tags initial-upload-closes-no-bugs,no-manual-page debian-package.deb || true

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: debian-package.deb

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-wheel, build-deb]
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: deb/

      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE.md
          files: |
            dist/*
            deb/debian-package.deb
