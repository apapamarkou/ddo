# languages.yaml — Language package patterns for Debian Desktop Optimizer
#
# Each top-level key is a BCP-47 language code.
# "name"     : human-readable English name
# "patterns" : list of glob patterns matching language-specific packages
#
# This file drives ALL language detection.  Add new languages here without
# touching Python source.

